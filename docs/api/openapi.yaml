openapi: 3.0.3
info:
  title: AssetFlow API
  description: Enterprise IT Asset Management Platform API.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Current API Version

paths:
  /auth/login:
    post:
      summary: Authenticate User
      description: Exchanges credentials for a short-lived access token and a persistent refresh token.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
        '401':
          description: Invalid credentials
        '403':
          description: Account locked
        '429':
          description: Too many login attempts
