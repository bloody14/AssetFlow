version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: assetflow-db
    environment:
      POSTGRES_USER: ${DB_USER:-assetflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-assetflow_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-assetflow} -d ${DB_NAME:-assetflow_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetflow-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://${DB_USER:-assetflow}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-assetflow_dev}?schema=public
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_must_be_changed_in_prod_over_64_bytes_long}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
